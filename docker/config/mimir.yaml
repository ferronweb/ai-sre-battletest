target: all
server:
  http_listen_port: 9009
  grpc_listen_port: 9095
multitenancy_enabled: false
blocks_storage:
  backend: filesystem
  filesystem:
    dir: /data/blocks
  tsdb:
    dir: /data/tsdb
compactor:
  data_dir: /data/compactor
distributor:
  ring:
    kvstore:
      store: memberlist
ingester:
  ring:
    kvstore:
      store: memberlist
    replication_factor: 1
store_gateway:
  sharding_ring:
    replication_factor: 1
ruler_storage:
  backend: filesystem
  filesystem:
    dir: /data/rules
