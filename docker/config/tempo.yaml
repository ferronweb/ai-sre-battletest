server:
  http_listen_port: 3200
distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: "0.0.0.0:4317"
storage:
  trace:
    backend: local
    local:
      path: /var/tempo/blocks
metrics_generator:
  registry:
    external_labels:
      source: tempo
  storage:
    path: /var/tempo/generator/wal
    remote_write:
      - url: "http://mimir:9009/api/v1/push"
overrides:
  defaults:
    metrics_generator:
      processors: [span-metrics, service-graphs]
