{
    admin { listen "0.0.0.0:8081" }
    observability {
        provider prometheus
        endpoint_listen "0.0.0.0:8889"
    }
}
*:80 {
    log "access" {
        format json
    }
    proxy {
        algorithm round_robin
        retry_connection true
        upstream http://backend-1:3000
        upstream http://backend-2:3000
        upstream http://backend-3:3000
    }
}
